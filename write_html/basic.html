<button type="button" onclick="ToggleEquipmentViewer">View Equipment</button>

<div id="equipment-viewer" style="border: 1px solid black; margin: 5em auto; display: flex; justify-content: center; align-items: center;">
    {% if equipment_list %}
        <table border="1" cellpadding="8">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Year</th>
                    <th>Status</th>
                    <th>Notes</th>
                    <th>ID</th>
                </tr>
            </thead>
            <tbody>
                {% for item in equipment_list %}
                <tr>
                    <td>{{ item.name }}</td>
                    <td>{{ item.year }}</td>
                    <td>{{ item.status }}</td>
                    <td>{{ item.notes }}</td>
                    <td>{{ item.id }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No equipment found.</p>
    {% endif %}
</div>
